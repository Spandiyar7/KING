# Netlify build config — деплой того же Next.js статик-экспорта.
# На Netlify сайт отдаётся из корня (без basePath /KING), поэтому GITHUB_PAGES не задаём.
[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NEXT_PUBLIC_SITE_URL = "https://kingatelier.kz"
